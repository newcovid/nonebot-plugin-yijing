<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><style>
body{margin:0;padding:32px;background:#efe7d3;font-family:"Microsoft YaHei",sans-serif;color:#2b2118}.page{width:840px;margin:auto;background:#fffaf0;border:2px solid #d8c29a;border-radius:26px;padding:34px;box-shadow:0 18px 60px rgba(79,55,26,.24)}h1{font-size:34px;margin:0 0 18px}.item{padding:14px 16px;border:1px solid #e3d0aa;border-radius:14px;margin:10px 0;background:#fffdf5}.cmd{font-weight:800;font-size:21px;color:#6b4218}.desc{font-size:17px;line-height:1.6;color:#56432d}.children{margin-top:12px;padding:4px 0 0 18px;border-left:3px solid #d8c29a}.child{margin:8px 0}.child .cmd{font-size:18px}.child .desc{font-size:15px}.muted{color:#826f55;font-size:15px;line-height:1.7}</style></head><body><div class="page"><h1>易经帮助</h1>{% for item in commands %}<div class="item"><div class="cmd">{{ item.cmd }}</div><div class="desc">{{ item.desc }}</div>{% if item.children %}<div class="children">{% for child in item.children %}<div class="child"><div class="cmd">{{ child.cmd }}</div><div class="desc">{{ child.desc }}</div></div>{% endfor %}</div>{% endif %}</div>{% endfor %}<div class="muted">所有铜钱输入统一使用“正/反”。手动铜钱输入示例：正反正 反反正 正正反 正反反 反正正 反反反。六组均按自下而上输入。</div></div></body></html>
