{% extends "base.html" %}
{% block extra_style %}
<style>
  .page { width: 760px; }
  h1 { padding-bottom: 14px; border-bottom: 2px solid var(--border); }
  .content { padding: 18px; background: var(--paper-soft); border: 1px solid var(--border-soft); border-radius: var(--radius-card); font-size: 21px; line-height: 1.75; white-space: pre-wrap; }
  .hint { margin-top: 18px; padding: 13px 15px; color: var(--ink-soft); background: #f4ead3; border-left: 4px solid var(--accent-warm); border-radius: 10px; font-size: 16px; line-height: 1.65; }
</style>
{% endblock %}
{% block content %}
<main class="page">
  <h1>{{ title }}</h1>
  <div class="content">{{ content }}</div>
  {% if hint %}<div class="hint">{{ hint }}</div>{% endif %}
</main>
{% endblock %}
