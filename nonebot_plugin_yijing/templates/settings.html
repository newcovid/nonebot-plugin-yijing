{% extends "base.html" %}
{% block extra_style %}
<style>
  .page { width: 820px; }
  table { width: 100%; overflow: hidden; background: var(--paper-soft); border: 1px solid var(--border-soft); border-collapse: separate; border-spacing: 0; border-radius: 16px; font-size: 18px; }
  td, th { padding: 14px; border-bottom: 1px solid var(--border-soft); text-align: left; }
  th { color: #5b3b15; background: #f4ead3; }
  tr:last-child td { border-bottom: 0; }
  .cmd { margin-top: 18px; padding: 14px; color: var(--ink-soft); background: #f4ead3; border-radius: 12px; font-size: 16px; line-height: 1.8; }
</style>
{% endblock %}
{% block content %}
<main class="page">
  <h1>易经设置</h1>
  <table><tr><th>项目</th><th>当前值</th></tr>{% for row in rows %}<tr><td>{{ row.name }}</td><td>{{ row.value }}</td></tr>{% endfor %}</table>
  <div class="cmd">支持：易经设置 开启｜关闭｜冷却 秒数｜日限额 次数｜重复窗口 分钟｜历史窗口 分钟｜默认 铜钱/大衍｜LLM 开启/关闭。设置类命令仅限群主、管理员或 superuser 使用。</div>
</main>
{% endblock %}
