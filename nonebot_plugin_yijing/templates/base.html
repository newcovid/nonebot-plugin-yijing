<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <style>
    :root {
      --paper: #fffaf0;
      --paper-soft: #fffdf5;
      --canvas: #efe7d3;
      --ink: #2b2118;
      --ink-soft: #715d42;
      --accent: #7b4d18;
      --accent-warm: #b66a27;
      --border: #d8c29a;
      --border-soft: #e3d0aa;
      --warning: #fff0d9;
      --radius-page: 28px;
      --radius-card: 18px;
      --shadow: 0 18px 60px rgba(79, 55, 26, .24);
    }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 32px; background: var(--canvas); color: var(--ink); font-family: "Noto Serif CJK SC", "Source Han Serif SC", "Microsoft YaHei", serif; }
    .page { width: 840px; margin: 0 auto; padding: 34px; background: var(--paper); border: 2px solid var(--border); border-radius: var(--radius-page); box-shadow: var(--shadow); overflow-wrap: anywhere; }
    h1 { margin: 0 0 18px; color: var(--ink); font-size: 34px; letter-spacing: .04em; }
    h2 { color: #5b3b15; }
    .muted, .meta { color: var(--ink-soft); }
    .panel { padding: 18px; background: var(--paper-soft); border: 1px solid var(--border-soft); border-radius: var(--radius-card); }
    .badge { display: inline-block; padding: 5px 11px; color: #fffaf0; background: var(--accent); border-radius: 999px; font-size: 14px; }
    .empty { padding: 20px; background: var(--paper-soft); border-radius: var(--radius-card); font-size: 20px; }
  </style>
  {% block extra_style %}{% endblock %}
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
