name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: yijing_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d yijing_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      YIJING_TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/yijing_test
      YIJING_TEST_SYNC_DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/yijing_test
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and development tools
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check . | tee ruff.log
      - name: Compile
        run: python -m compileall nonebot_plugin_yijing
      - name: Test
        run: pytest -q 2>&1 | tee pytest.log
      - name: Build distributions
        run: python -m build --sdist --wheel .
      - name: Check distributions
        run: twine check dist/*
      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-${{ matrix.python-version }}
          path: |
            ruff.log
            pytest.log
